version: "3.9"

services:

  postgres-replica:
    image: postgres:17
    container_name: postgres-replica
    restart: always

    env_file:
      - .env

    ports:
      - "7777:5432"

    volumes:
      - pg_replica_data:/var/lib/postgresql/data

    user: root

    command: >
      bash -c "
      rm -rf /var/lib/postgresql/data/*;

      echo 'Starting base backup...';

      until PGPASSWORD=$DB_PASSWORD pg_basebackup -h $PRIMARY_HOST -p $PRIMARY_PORT -U $DB_USER -D /var/lib/postgresql/data -Fp -Xs -R -P;
      do
        echo 'Primary not ready, retrying...';
        sleep 2;
      done;

      echo 'Base backup complete';

      chown -R postgres:postgres /var/lib/postgresql/data;
      chmod 0700 /var/lib/postgresql/data;

      exec gosu postgres postgres -D /var/lib/postgresql/data
      "

volumes:
  pg_replica_data: