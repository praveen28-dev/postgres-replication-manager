version: "3.9"

services:

  postgres-primary:
    image: postgres:17
    container_name: postgres-primary

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf

    command: postgres -c config_file=/etc/postgresql/postgresql.conf

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

    networks:
      - pg_net

volumes:
  pg_primary_data:

networks:
  pg_net:
    driver: bridge